<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e2e;
    font-family: sans-serif;
    color: #eee;
  }
  h1 { margin-bottom: 4px; }
  #score { margin-bottom: 10px; font-size: 18px; }
  canvas {
    background: #11111b;
    border: 2px solid #444;
  }
  #msg {
    margin-top: 10px;
    font-size: 16px;
    min-height: 20px;
  }
</style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Punkte: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="msg">Pfeiltasten zum Steuern. Leertaste = Neustart.</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const grid = 20;
const cells = canvas.width / grid;

let snake, dir, nextDir, food, score, running, timer;

function randCell() {
  return Math.floor(Math.random() * cells);
}

function placeFood() {
  let pos;
  do {
    pos = { x: randCell(), y: randCell() };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function reset() {
  snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = dir;
  score = 0;
  running = true;
  document.getElementById('msg').textContent = 'Pfeiltasten zum Steuern. Leertaste = Neustart.';
  updateScore();
  placeFood();
}

function updateScore() {
  document.getElementById('score').textContent = 'Punkte: ' + score;
}

function tick() {
  if (!running) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (
    head.x < 0 || head.x >= cells ||
    head.y < 0 || head.y >= cells ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    running = false;
    document.getElementById('msg').textContent = 'Game Over! Leertaste = Neustart.';
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#f38ba8';
  ctx.fillRect(food.x * grid, food.y * grid, grid - 1, grid - 1);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#a6e3a1' : '#89b4fa';
    ctx.fillRect(s.x * grid, s.y * grid, grid - 1, grid - 1);
  });
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    if (dir.y === 0) nextDir = { x: 0, y: -1 }; break;
    case 'ArrowDown':  if (dir.y === 0) nextDir = { x: 0, y: 1 }; break;
    case 'ArrowLeft':  if (dir.x === 0) nextDir = { x: -1, y: 0 }; break;
    case 'ArrowRight': if (dir.x === 0) nextDir = { x: 1, y: 0 }; break;
    case ' ':
      if (!running) reset();
      break;
  }
});

reset();
draw();
clearInterval(timer);
timer = setInterval(tick, 120);
</script>
</body>
</html>
